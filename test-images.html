<!DOCTYPE html>
<html>
<head>
    <title>Image Test</title>
</head>
<body>
    <h1>Testing Cloudinary Images</h1>
    
    <h2>Original URLs (without transformations):</h2>
    <img src="https://res.cloudinary.com/barthkosi/image/upload/v1756281622/bookworms_f3dtzz.png" alt="Test 1" style="max-width: 200px;">
    <br><br>
    
    <h2>With f_auto,q_auto:</h2>
    <img src="https://res.cloudinary.com/barthkosi/image/upload/f_auto,q_auto/v1756281622/bookworms_f3dtzz.png" alt="Test 2" style="max-width: 200px;">
    <br><br>
    
    <h2>With explicit format and quality:</h2>
    <img src="https://res.cloudinary.com/barthkosi/image/upload/f_png,q_80/v1756281622/bookworms_f3dtzz.png" alt="Test 3" style="max-width: 200px;">
    <br><br>
    
    <h2>With CORS-friendly settings:</h2>
    <img src="https://res.cloudinary.com/barthkosi/image/upload/f_auto,q_auto,fl_immutable_cache/v1756281622/bookworms_f3dtzz.png" alt="Test 4" style="max-width: 200px;">
    
    <script>
        // Test if images load
        document.querySelectorAll('img').forEach((img, index) => {
            img.onload = () => console.log(`Image ${index + 1} loaded successfully`);
            img.onerror = () => console.log(`Image ${index + 1} failed to load`);
        });
    </script>
</body>
</html>
